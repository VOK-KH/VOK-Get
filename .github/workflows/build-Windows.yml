name: Build Windows

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build with PyInstaller
        id: version
        shell: pwsh
        run: |
          $VERSION = (Select-String -Path "pyproject.toml" -Pattern '^version\s*=\s*"(.*)"').Matches[0].Groups[1].Value
          Write-Host "VERSION=$VERSION"
          echo "VERSION=$VERSION" >> $env:GITHUB_ENV
          "version=$VERSION" >> $env:GITHUB_OUTPUT
          uv run pyinstaller vok.spec --clean --noconfirm

      - name: Ensure Inno Setup is available
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            choco install innosetup --no-progress -y
          }

          if (!(Test-Path $iscc)) {
            Write-Error "Inno Setup is not available at $iscc"
            exit 1
          }

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "resources\installer\script_inno.iss" "/DMyAppVersion=$env:VERSION"

      - name: Create zip archive
        shell: pwsh
        run: |
          $zipFile = "VOK-v$env:VERSION-Windows-x86_64.zip"
          Compress-Archive -Path "dist\VOK\*" -DestinationPath $zipFile
          Write-Output "Created $zipFile"

      - name: Upload portable zip
        uses: actions/upload-artifact@v7
        with:
          name: VOK-v${{ steps.version.outputs.version }}-Windows-x86_64
          path: VOK-v${{ steps.version.outputs.version }}-Windows-x86_64.zip

      - name: Upload installer exe
        uses: actions/upload-artifact@v7
        with:
          name: VOK-v${{ steps.version.outputs.version }}-Windows-x86_64-Setup
          path: dist/VOK-v${{ steps.version.outputs.version }}-Windows-x86_64-Setup.exe

